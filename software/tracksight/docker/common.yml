services:
  influx:
    image: influxdb:2-alpine
    ports:
      # InfluxDB port is always 8086 internally
      - "${INFLUXDB_PORT}:8086"
    env_file: envs/influx.env
    healthcheck:
      # Ping server every 30s in case something breaks.
      test: [ "CMD", "curl", "-f", "http://localhost:8086/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      # Ping at higher frequency at startup since dependant containers don't start until this one passes health check.
      start_period: 10s
      start_interval: 1s
  backend:
    build:
      context: ../../../
      dockerfile: software/tracksight/rust_backend/Dockerfile
      # Used to build backend with different verbosity levels
      # args: 
      #   DOCKER_VERBOSITY: "VERBOSE" # or "DEBUG"
    # Let backend know it's running in docker
    environment:
      DOCKER: "true"
    # Expose port from container
    network_mode: host
    extra_hosts:
      - "influx:127.0.0.1"
    # ports:
    #  - "${BACKEND_PORT}:${BACKEND_PORT}"
    env_file: envs/backend.env
    # Privileged provides access to all serial ports, not need to pass serial port through
    privileged: true
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
    depends_on:
      influx:
        condition: service_healthy
    # healthcheck:
    #   # Ping server every 30s in case something breaks.
    #   test: [ "CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/health" ]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
      # Ping at higher frequency at startup since dependant containers don't start until this one passes health check.
      # start_period: 10s
      # start_interval: 1s
  frontend:
    build: 
      context: ../../../
      dockerfile: software/tracksight/frontend/Dockerfile
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      BACKEND_PORT: ${BACKEND_PORT}
    env_file: envs/frontend.env
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
