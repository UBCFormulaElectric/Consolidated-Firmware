name: tracksight-docker
services:
  influx:
    extends:
      file: ../common.yml
      service: influx
  backend:
    extends:
      file: ../common.yml
      service: backend
    # Used to build backend with different verbosity levels
    # build:
    #   args: 
    #     DOCKER_VERBOSITY: "VERBOSE" # or "DEBUG"
  frontend:
    extends:
      file: ../common.yml
      service: frontend
    command:
      [
        "npm",
        "start"
     ]
