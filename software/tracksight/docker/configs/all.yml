name: tracksight-docker
services:
  influx:
    extends:
      file: ../common.yml
      service: influx
  backend:
    extends:
      file: ../common.yml
      service: backend
    environment:
      DOCKER_VERBOSITY: "verbose"
  frontend:
    extends:
      file: ../common.yml
      service: frontend
    command:
      [
        "npm",
        "start"
     ]
